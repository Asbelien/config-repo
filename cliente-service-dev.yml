server:
  port: 8084

spring:
  application:
    name: cliente-service

  datasource:
    url: jdbc:mysql://localhost:3306/clientes_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      pedidoService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      pedidoRetry:
        maxAttempts: 3
        waitDuration: 2s
