server:
  port: 8083

spring:
  application:
    name: producto-service

  datasource:
    url: jdbc:mysql://localhost:3306/bd_producto_dev
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

empresa:
  ambiente: desarrollo

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
