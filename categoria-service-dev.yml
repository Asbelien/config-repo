server:
  port: 8082
spring:
  application:
    name: categoria-service
  datasource:
    url: jdbc:mysql://localhost:3306/bd_categoria_dev
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
empresa:
  ambiente: desarrollo
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
