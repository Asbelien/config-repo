server:
  port: 8085

spring:
  application:
    name: pedido-service

  datasource:
    url: jdbc:mysql://localhost:3306/pedidos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
